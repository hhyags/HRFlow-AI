name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/hrflow
          DIRECT_URL: postgresql://user:pass@localhost:5432/hrflow
      - run: npm run test:coverage
      - run: npm run build
      - run: npm audit --omit=dev
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run real-auth Playwright tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.HRFLOW_PRODUCTION_URL }}
          QA_HR_MANAGER_EMAIL: ${{ secrets.QA_HR_MANAGER_EMAIL }}
          QA_HR_MANAGER_PASSWORD: ${{ secrets.QA_HR_MANAGER_PASSWORD }}
          QA_RECRUITER_1_EMAIL: ${{ secrets.QA_RECRUITER_1_EMAIL }}
          QA_RECRUITER_1_PASSWORD: ${{ secrets.QA_RECRUITER_1_PASSWORD }}
          QA_EMPLOYEE_1_EMAIL: ${{ secrets.QA_EMPLOYEE_1_EMAIL }}
          QA_EMPLOYEE_1_PASSWORD: ${{ secrets.QA_EMPLOYEE_1_PASSWORD }}
