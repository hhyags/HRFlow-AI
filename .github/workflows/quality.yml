name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/hrflow
          DIRECT_URL: postgresql://user:pass@localhost:5432/hrflow
      - run: npm run test:coverage
      - run: npm run build
      - run: npm audit --omit=dev
